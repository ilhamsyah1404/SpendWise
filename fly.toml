# fly.toml — Deploy SpendWise ke Fly.io (gratis tier)
# Panduan lengkap: DEPLOY_POCKETBASE.md

app            = "spendwise-app"   # ganti nama unik kamu
primary_region = "sin"             # Singapore — paling dekat Indonesia

[build]

[http_service]
  internal_port       = 8090
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "5s"
  interval     = "30s"
  method       = "GET"
  timeout      = "5s"
  path         = "/api/health"

# Volume permanen untuk data PocketBase (SQLite + uploads)
[mounts]
  destination = "/pb/pb_data"
  source      = "pb_data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1